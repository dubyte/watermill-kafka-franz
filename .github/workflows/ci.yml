name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Start Kafka
        run: docker compose up -d

      - name: Wait for Kafka
        run: |
          timeout 60s bash -c 'until docker compose exec kafka kafka-broker-api-versions --bootstrap-server localhost:9092; do sleep 2; done'

      - name: Run Tests
        run: go test -v -race ./...

      - name: Stop Kafka
        if: always()
        run: docker compose down
