# Docker Compose configuration for integration tests
#
# Services:
#   - Redpanda: Kafka-compatible broker (host: 127.0.0.1:9092, container: redpanda:29092)
#   - Toxiproxy: Fault-injection proxy (kafka proxy: host 19092 -> redpanda:9092, control API: 8474)
#
# Usage:
#   1. Start: docker compose up -d
#   2. Wait:  make wait-for-redpanda
#   3. Test:  make test-integration
#   4. Stop:  docker compose down

services:
  redpanda:
    image: redpandadata/redpanda:v26.1.6
    container_name: watermill-redpanda
    hostname: redpanda
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:29092,external://127.0.0.1:9092
      - --pandaproxy-addr
      - internal://0.0.0.0:28082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - internal://redpanda:28082,external://127.0.0.1:8082
      - --schema-registry-addr
      - internal://0.0.0.0:28081,external://0.0.0.0:8081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || rpk cluster health"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    container_name: watermill-toxiproxy
    hostname: toxiproxy
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8474:8474"
      - "19092:19092"
    command:
      - -host=0.0.0.0
